name: PR Build & Run

on:
  pull_request:
    branches: [main]

jobs:
  build-and-run:
    runs-on: self-hosted

    env:
      IMAGE_NAME: backtest-bench
      CONTAINER_NAME: backtest-bench-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Stop & remove previous containers for this PR
        run: docker compose down --remove-orphans 2>/dev/null || true

      - name: Build & run via docker compose
        env:
          TINKOFF_TOKEN: ${{ secrets.TINKOFF_TOKEN }}
        run: docker compose up -d --build

      - name: Smoke-check (containers stay up 10 s)
        run: |
          sleep 10
          docker compose ps
          EXITED=$(docker compose ps --status exited -q)
          [ -z "$EXITED" ]

  cleanup:
    runs-on: self-hosted
    if: github.event.action == 'closed'
    needs: []

    env:
      IMAGE_NAME: backtest-bench
      CONTAINER_NAME: backtest-bench-pr-${{ github.event.pull_request.number }}

    steps:
      - name: Stop & remove container on PR close
        run: |
          docker stop $CONTAINER_NAME 2>/dev/null || true
          docker rm   $CONTAINER_NAME 2>/dev/null || true
          docker rmi  $IMAGE_NAME:pr-${{ github.event.pull_request.number }} 2>/dev/null || true

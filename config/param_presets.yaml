# Shared parameter presets for composable strategies.
# Defaults tuned on SBER 1h (30-day lookback, seed=42); grids keep winners + practical neighbors.
# Include 5 / 40 for integration and optimizer unit tests that pass explicit overrides.
ma_short:        [5, 8, 10, 12, 21, 30, 50]
ma_long:         [20, 30, 50, 100]
rsi_period:      [7, 9, 14, 20]
rsi_oversold:    [20, 25, 30]
rsi_overbought:  [60, 65, 70]
rsi_buy_min:     [40, 45, 50, 55]
stop_loss_pct:   [0.5, 0.7, 1.0, 1.5]
take_profit_pct: [0.5, 1.0, 1.5, 2.0]

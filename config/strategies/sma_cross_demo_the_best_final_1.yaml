name: sma_cross_demo_the_best_final_1
title: SMA Cross Demo

params:
  fast:            { type: int,   default: 15, choices: [10, 15, 21, 30], optimizable: false }
  slow:            { type: int,   default: 20, choices: preset:ma_long, optimizable: fasle }
  stop_loss_pct:   { type: float, default: 0.7, choices: [0.5,0.7,1.0,1.5], optimizable: true }
  take_profit_pct: { type: float, default: 0.5, choices:  [0.3,0.5,0.7,], optimizable: true }
  order_size:      { type: float, default: 1,  choices: [1], optimizable: false }

constraints:
  - fast < slow

series:
  fast_ma: { fn: sma, source: price, period: "${fast}" }
  slow_ma: { fn: sma, source: price, period: "${slow}" }

rules:
  - id: stop_loss
    scope: long
    priority: 100
    when: { loss_pct: { gt: "${stop_loss_pct}" } }
    then: { action: sell, size: all }

  - id: take_profit
    scope: long
    priority: 90
    when: { profit_pct: { gt: "${take_profit_pct}" } }
    then: { action: sell, size: all }

  - id: exit
    scope: long
    priority: 10
    when: { cross_below: [fast_ma, slow_ma] }
    then: { action: sell, size: all }

  - id: entry
    scope: flat
    priority: 10
    when: { cross_above: [fast_ma, slow_ma] }
    then:
      action: buy
      size: "${order_size}"

# Example strategy configuration.
# `name` selects the registered strategy ID. `params` is validated by the strategy.
name: ma_crossover
instrument: SBER
timeframe: 1m
version: "1"
params:
  fast: 10          # fast SMA window (candles); must be > 0 and < slow
  slow: 30          # slow SMA window (candles)
  order_size: 1.0   # emitted as Signal.size

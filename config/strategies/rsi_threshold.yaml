# Example config for the second built-in strategy (issue #67).
name: rsi_threshold
instrument: SBER
timeframe: 1m
version: "1"
params:
  period: 14        # RSI lookback window
  oversold: 30      # buy when RSI <= this (and flat)
  overbought: 70    # sell when RSI >= this (and holding)
  order_size: 1.0

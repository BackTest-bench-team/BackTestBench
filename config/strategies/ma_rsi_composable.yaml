# Composable equivalent of the original `ma_rsi` strategy.
# Defaults from SBER 1h optimizer rank-1 (fast=12, slow=50, rsi=20, SL=0.7, TP=1.0).
name: ma_rsi_composable
title: MA Crossover + RSI (composable)

params:
  fast:            { type: int,   default: 12, choices: preset:ma_short,        optimizable: true }
  slow:            { type: int,   default: 50, choices: preset:ma_long,         optimizable: true }
  rsi_period:      { type: int,   default: 20, choices: preset:rsi_period,    optimizable: true }
  rsi_buy_min:     { type: float, default: 50, choices: preset:rsi_buy_min,   optimizable: true }
  rsi_overbought:  { type: float, default: 65, choices: preset:rsi_overbought, optimizable: true }
  stop_loss_pct:   { type: float, default: 0.7, choices: preset:stop_loss_pct,   optimizable: true }
  take_profit_pct: { type: float, default: 1.0, choices: preset:take_profit_pct, optimizable: true }
  order_size:      { type: float, default: 1,  choices: [1, 2, 3],              optimizable: false }

constraints:
  - fast < slow
  - take_profit_pct > stop_loss_pct
  - rsi_buy_min < rsi_overbought

series:
  fast_ma: { fn: sma, source: price, period: "${fast}" }
  slow_ma: { fn: sma, source: price, period: "${slow}" }
  rsi:     { fn: rsi, source: price, period: "${rsi_period}" }

rules:
  - id: stop_loss
    scope: long
    priority: 100
    when: { loss_pct: { gt: "${stop_loss_pct}" } }
    then: { action: sell, size: all }

  - id: take_profit
    scope: long
    priority: 90
    when: { profit_pct: { gt: "${take_profit_pct}" } }
    then: { action: sell, size: all }

  - id: signal_exit
    scope: long
    priority: 10
    when:
      any:
        - cross_below: [fast_ma, slow_ma]
        - gte: [rsi, "${rsi_overbought}"]
    then: { action: sell, size: all }

  - id: entry
    scope: flat
    priority: 10
    when:
      all:
        - cross_above: [fast_ma, slow_ma]
        - gte: [rsi, "${rsi_buy_min}"]
    then:
      action: buy
      size: "${order_size}"
      stop_loss_pct: "${stop_loss_pct}"
      take_profit_pct: "${take_profit_pct}"

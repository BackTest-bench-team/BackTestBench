name: rsi_bounce_demo
title: RSI Bounce Demo

params:
  rsi_period:      { type: int,   default: 7,  choices: preset:rsi_period,      optimizable: true }
  rsi_oversold:    { type: float, default: 25, choices: preset:rsi_oversold,   optimizable: true }
  rsi_overbought:  { type: float, default: 65, choices: preset:rsi_overbought, optimizable: true }
  stop_loss_pct:   { type: float, default: 5,  choices: [3, 5, 7],            optimizable: true }
  order_size:      { type: float, default: 1,  choices: [1],                   optimizable: false }

constraints:
  - rsi_oversold < rsi_overbought

series:
  rsi: { fn: rsi, source: price, period: "${rsi_period}" }

rules:
  - id: stop_loss
    scope: long
    priority: 100
    when: { loss_pct: { gt: "${stop_loss_pct}" } }
    then: { action: sell, size: all }

  - id: exit
    scope: long
    priority: 10
    when: { gte: [rsi, "${rsi_overbought}"] }
    then: { action: sell, size: all }

  - id: entry
    scope: flat
    priority: 10
    when: { lte: [rsi, "${rsi_oversold}"] }
    then:
      action: buy
      size: "${order_size}"

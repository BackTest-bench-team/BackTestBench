openapi: 3.0.3
info:
  title: BackTestBench API
  description: REST API for the BackTestBench dashboard.
  version: 1.0.0
tags:
  - name: Dashboard
  - name: Config
  - name: Strategies
  - name: Tokens
  - name: Explore
  - name: Bot
  - name: Live
  - name: Progress
paths:
  /api/dashboard:
    get:
      tags: [Dashboard]
      summary: Get dashboard state
      operationId: getDashboard
      responses:
        "200":
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardState"
  /api/bootstrap:
    post:
      tags: [Dashboard]
      summary: Start bootstrap backtest
      operationId: postBootstrap
      responses:
        "202":
          description: Bootstrap started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResponse"
        "500":
          description: Launch failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/stop:
    post:
      tags: [Dashboard]
      summary: Stop running bootstrap
      operationId: postStop
      responses:
        "202":
          description: Stop accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok, stopped]
                properties:
                  ok:
                    type: boolean
                  stopped:
                    type: boolean
                  killed:
                    type: boolean
                  dashboard_updated:
                    type: boolean
        "500":
          description: Stop failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/refresh-ranking:
    post:
      tags: [Dashboard]
      summary: Refresh strategy Top-N ranking
      operationId: postRefreshRanking
      responses:
        "202":
          description: Ranking refresh started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResponse"
        "500":
          description: Launch failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/run-progress:
    get:
      tags: [Progress]
      summary: Bootstrap fetch/backtest progress
      operationId: getRunProgress
      responses:
        "200":
          description: Progress payload or inactive
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/config:
    get:
      tags: [Config]
      summary: Load runtime settings schema
      operationId: getConfig
      responses:
        "200":
          description: Settings and schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigGetResponse"
        "500":
          description: Load failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Config]
      summary: Save runtime settings
      operationId: postConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeSettings"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                type: object
                required: [ok, settings]
                properties:
                  ok:
                    type: boolean
                  settings:
                    type: object
                    additionalProperties: true
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Save failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/strategies:
    post:
      tags: [Strategies]
      summary: Add composable strategy YAML
      operationId: postStrategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [yaml]
              properties:
                yaml:
                  type: string
      responses:
        "200":
          description: Strategy added
          content:
            application/json:
              schema:
                type: object
                required: [ok, strategy]
                properties:
                  ok:
                    type: boolean
                  strategy:
                    $ref: "#/components/schemas/StrategySummary"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Save failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/strategies/{id}:
    patch:
      tags: [Strategies]
      summary: Toggle strategy enabled for bootstrap
      operationId: patchStrategyEnabled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  strategy_id:
                    type: string
                  enabled:
                    type: boolean
                  params:
                    type: object
                    additionalProperties: true
        "400":
          description: Update failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Strategies]
      summary: Delete composable strategy
      operationId: deleteStrategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Strategy deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok, deleted, file]
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: string
                  file:
                    type: string
        "400":
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/tokens:
    get:
      tags: [Tokens]
      summary: Get broker token status
      operationId: getTokens
      responses:
        "200":
          description: Token status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenStatusResponse"
        "500":
          description: Load failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Tokens]
      summary: Save and optionally verify tokens
      operationId: postTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenSaveRequest"
      responses:
        "200":
          description: Tokens saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenStatusResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenStatusResponse"
        "500":
          description: Save failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/explore:
    get:
      tags: [Explore]
      summary: Explore limits, job list, or job status
      operationId: getExplore
      parameters:
        - name: list
          in: query
          schema:
            type: string
            enum: ["1"]
        - name: job_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Explore]
      summary: Queue explore job
      operationId: postExplore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExploreStartRequest"
      responses:
        "202":
          description: Job queued
          content:
            application/json:
              schema:
                type: object
                required: [ok, job_id]
                properties:
                  ok:
                    type: boolean
                  job_id:
                    type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Start failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Explore]
      summary: Delete explore job
      operationId: deleteExplore
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Missing job_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/bot:
    get:
      tags: [Bot]
      summary: Bot limits, job list, or job status
      operationId: getBot
      parameters:
        - name: list
          in: query
          schema:
            type: string
            enum: ["1"]
        - name: job_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Bot]
      summary: Start, stop, or resume bot job
      operationId: postBot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/BotStartRequest"
                - $ref: "#/components/schemas/BotStopRequest"
                - $ref: "#/components/schemas/BotResumeRequest"
      responses:
        "202":
          description: Bot started or resumed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Bot]
      summary: Stop and delete bot job
      operationId: deleteBot
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job removed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Missing job_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/live-run:
    get:
      tags: [Live]
      summary: Live refresh status
      operationId: getLiveRun
      responses:
        "200":
          description: Active flag and strategy state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRunResponse"
        "500":
          description: Status failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Live]
      summary: Start or stop live refresh
      operationId: postLiveRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LiveRunRequest"
      responses:
        "200":
          description: Start/stop result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRunResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/live-run/tick:
    post:
      tags: [Live]
      summary: Run one live tick
      operationId: postLiveRunTick
      responses:
        "200":
          description: Updated strategy metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRunResponse"
        "500":
          description: Tick failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
    StartResponse:
      type: object
      required: [ok, started]
      properties:
        ok:
          type: boolean
        started:
          type: boolean
        message:
          type: string
    StrategySummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        file:
          type: string
    StrategyMetrics:
      type: object
      properties:
        total_pnl:
          type: number
        sharpe_ratio:
          type: number
        max_drawdown:
          type: number
        win_rate:
          type: number
        deposit_baseline_pnl:
          type: number
    StrategyEntry:
      type: object
      properties:
        strategy_id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [idle, running, completed, error]
        params:
          type: object
          additionalProperties: true
        metrics:
          $ref: "#/components/schemas/StrategyMetrics"
        chart_points:
          type: array
          items:
            type: object
            additionalProperties: true
        trade_log:
          type: array
          items:
            type: object
            additionalProperties: true
    RankingEntry:
      type: object
      properties:
        rank:
          type: integer
        strategy_id:
          type: string
        instrument:
          type: string
        total_pnl:
          type: number
        sharpe_ratio:
          type: number
        max_drawdown:
          type: number
        win_rate:
          type: number
        previous_rank:
          type: integer
          nullable: true
        rank_delta:
          type: integer
          nullable: true
    DashboardState:
      type: object
      properties:
        instrument:
          type: string
        timeframe:
          type: string
        data_source:
          type: string
        initial_capital:
          type: number
        strategies:
          type: array
          items:
            $ref: "#/components/schemas/StrategyEntry"
        ranking:
          type: object
          properties:
            computed_at:
              type: string
              nullable: true
              format: date-time
            entries:
              type: array
              items:
                $ref: "#/components/schemas/RankingEntry"
        last_updated:
          type: string
          nullable: true
          format: date-time
    RuntimeSettings:
      type: object
      properties:
        data_source:
          type: string
        instrument:
          type: string
        timeframe:
          type: string
        lookback_days:
          type: integer
        initial_capital:
          type: number
        optimization_mode:
          type: string
        optimization_iterations:
          type: integer
        optimization_seed:
          type: integer
    ConfigGetResponse:
      type: object
      required: [ok, settings, schema]
      properties:
        ok:
          type: boolean
        settings:
          type: object
          additionalProperties: true
        schema:
          type: object
          additionalProperties: true
        tokens:
          type: object
          additionalProperties:
            type: object
            properties:
              configured:
                type: boolean
              masked:
                type: string
                nullable: true
    TokenInfo:
      type: object
      properties:
        configured:
          type: boolean
        masked:
          type: string
          nullable: true
        valid:
          type: boolean
        message:
          type: string
    TokenStatusResponse:
      type: object
      properties:
        ok:
          type: boolean
        tokens:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/TokenInfo"
        message:
          type: string
    TokenSaveRequest:
      type: object
      properties:
        tinkoff_token:
          type: string
        twelvedata_token:
          type: string
        verify:
          type: boolean
    ExploreStartRequest:
      type: object
      required: [strategy_id]
      properties:
        strategy_id:
          type: string
        title:
          type: string
        params:
          type: object
          additionalProperties: true
        initial_capital:
          type: number
        from_date:
          type: string
          format: date
        to_date:
          type: string
          format: date
        instrument:
          type: string
        broker_source:
          type: string
          enum: [tbank, twelvedata, bybit, binance]
    BotStartRequest:
      type: object
      required: [strategy_id]
      properties:
        strategy_id:
          type: string
        params:
          type: object
          additionalProperties: true
        instrument:
          type: string
        broker_source:
          type: string
          enum: [tbank, twelvedata, bybit, binance]
        timeframe:
          type: string
        days_to_fetch:
          type: integer
        use_sandbox:
          type: boolean
        initial_capital:
          type: number
    BotStopRequest:
      type: object
      required: [action, job_id]
      properties:
        action:
          type: string
          enum: [stop]
        job_id:
          type: string
    BotResumeRequest:
      type: object
      required: [action, job_id]
      properties:
        action:
          type: string
          enum: [resume]
        job_id:
          type: string
    LiveRunRequest:
      type: object
      required: [action, strategy_id]
      properties:
        action:
          type: string
          enum: [start, stop]
        strategy_id:
          type: string
        params:
          type: object
          additionalProperties:
            type: number
    LiveRunResponse:
      type: object
      properties:
        ok:
          type: boolean
        active:
          type: boolean
        strategy_id:
          type: string
        strategy:
          type: object
          additionalProperties: true
        live:
          type: object
          additionalProperties: true
        stopped_reason:
          type: string
        message:
          type: string

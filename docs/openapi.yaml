openapi: 3.0.3
info:
  title: BackTestBench Dashboard API
  description: |
    Live Next.js route handlers used by the MVP2 dashboard (`http://localhost`, Docker Compose default port 80).

    Python subprocesses write JSON state under `data/`. This is not a durable run-history store.

    Planned FastAPI routes on port 8000 are listed under the **Planned** tag — they are not callable yet.

    Markdown reference: `docs/api_description.md`
  version: 1.0.0
  contact:
    name: BackTestBench
servers:
  - url: http://localhost
    description: Docker Compose (default host port 80)
tags:
  - name: Dashboard
  - name: Config
  - name: Strategies
  - name: Tokens
    description: Broker API token status and persistence
  - name: Live
    description: Single-strategy live refresh (poll + tick)
  - name: Progress
    description: Bootstrap run progress
  - name: Planned
    description: Target FastAPI contract — not implemented
paths:
  /api/dashboard:
    get:
      tags: [Dashboard]
      summary: Get dashboard state
      operationId: getDashboard
      responses:
        "200":
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardState"
  /api/bootstrap:
    post:
      tags: [Dashboard]
      summary: Start bootstrap backtest
      operationId: postBootstrap
      responses:
        "202":
          description: Bootstrap started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResponse"
        "500":
          description: Launch failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/stop:
    post:
      tags: [Dashboard]
      summary: Stop running bootstrap
      operationId: postStop
      responses:
        "202":
          description: Stop accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok, stopped]
                properties:
                  ok:
                    type: boolean
                  stopped:
                    type: boolean
                  killed:
                    type: boolean
                  dashboard_updated:
                    type: boolean
        "500":
          description: Stop failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/refresh-ranking:
    post:
      tags: [Dashboard]
      summary: Refresh strategy Top-N ranking
      operationId: postRefreshRanking
      responses:
        "202":
          description: Ranking refresh started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResponse"
        "500":
          description: Launch failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/run-progress:
    get:
      tags: [Progress]
      summary: Bootstrap fetch/backtest progress
      operationId: getRunProgress
      responses:
        "200":
          description: Progress payload or inactive
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/config:
    get:
      tags: [Config]
      summary: Load runtime settings schema
      operationId: getConfig
      responses:
        "200":
          description: Settings and schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigGetResponse"
        "500":
          description: Load failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Config]
      summary: Save runtime settings
      operationId: postConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeSettings"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                type: object
                required: [ok, settings]
                properties:
                  ok:
                    type: boolean
                  settings:
                    type: object
                    additionalProperties: true
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Save failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/strategies:
    post:
      tags: [Strategies]
      summary: Add composable strategy YAML
      operationId: postStrategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [yaml]
              properties:
                yaml:
                  type: string
      responses:
        "200":
          description: Strategy added
          content:
            application/json:
              schema:
                type: object
                required: [ok, strategy]
                properties:
                  ok:
                    type: boolean
                  strategy:
                    $ref: "#/components/schemas/StrategySummary"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Save failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/strategies/{id}:
    patch:
      tags: [Strategies]
      summary: Toggle strategy enabled for bootstrap
      operationId: patchStrategyEnabled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    delete:
      tags: [Strategies]
      summary: Delete composable strategy
      operationId: deleteStrategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Strategy deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok, deleted, file]
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: string
                  file:
                    type: string
        "400":
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/tokens:
    get:
      tags: [Tokens]
      summary: Get broker token status
      operationId: getTokens
      responses:
        "200":
          description: Token status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenStatusResponse"
        "500":
          description: Load failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Tokens]
      summary: Save and optionally verify tokens
      operationId: postTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenSaveRequest"
      responses:
        "200":
          description: Tokens saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenStatusResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenStatusResponse"
        "500":
          description: Save failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/run-progress:
    get:
      tags: [Progress]
      summary: Bootstrap fetch/backtest progress
      operationId: getRunProgress
      responses:
        "200":
          description: Progress payload or inactive
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/live-run:
    get:
      tags: [Live]
      summary: Live refresh status
      operationId: getLiveRun
      responses:
        "200":
          description: Active flag and strategy_id
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Live]
      summary: Start or stop live refresh
      operationId: postLiveRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Start/stop result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/live-run/tick:
    post:
      tags: [Live]
      summary: Run one live tick
      operationId: postLiveRunTick
      responses:
        "200":
          description: Updated strategy metrics
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "500":
          description: Tick failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/live-run:
    get:
      tags: [Live]
      summary: Live refresh status
      operationId: getLiveRun
      responses:
        "200":
          description: Active flag and strategy state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRunResponse"
        "500":
          description: Status failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Live]
      summary: Start or stop live refresh
      operationId: postLiveRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LiveRunRequest"
      responses:
        "200":
          description: Start/stop result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRunResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/live-run/tick:
    post:
      tags: [Live]
      summary: Run one live tick
      operationId: postLiveRunTick
      responses:
        "200":
          description: Updated strategy metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveRunResponse"
        "500":
          description: Tick failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
    StartResponse:
      type: object
      required: [ok, started]
      properties:
        ok:
          type: boolean
        started:
          type: boolean
        message:
          type: string
    StrategySummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        file:
          type: string
    StrategyMetrics:
      type: object
      properties:
        total_pnl:
          type: number
        sharpe_ratio:
          type: number
        max_drawdown:
          type: number
        win_rate:
          type: number
        deposit_baseline_pnl:
          type: number
    StrategyEntry:
      type: object
      properties:
        strategy_id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [idle, running, completed, error]
        params:
          type: object
          additionalProperties: true
        metrics:
          $ref: "#/components/schemas/StrategyMetrics"
        chart_points:
          type: array
          items:
            type: object
            additionalProperties: true
        trade_log:
          type: array
          items:
            type: object
            additionalProperties: true
    RankingEntry:
      type: object
      properties:
        rank:
          type: integer
        strategy_id:
          type: string
        instrument:
          type: string
        total_pnl:
          type: number
        sharpe_ratio:
          type: number
        max_drawdown:
          type: number
        win_rate:
          type: number
        previous_rank:
          type: integer
          nullable: true
        rank_delta:
          type: integer
          nullable: true
    DashboardState:
      type: object
      properties:
        instrument:
          type: string
        timeframe:
          type: string
        data_source:
          type: string
        initial_capital:
          type: number
        strategies:
          type: array
          items:
            $ref: "#/components/schemas/StrategyEntry"
        ranking:
          type: object
          properties:
            computed_at:
              type: string
              nullable: true
              format: date-time
            entries:
              type: array
              items:
                $ref: "#/components/schemas/RankingEntry"
        last_updated:
          type: string
          nullable: true
          format: date-time
    RuntimeSettings:
      type: object
      properties:
        data_source:
          type: string
        instrument:
          type: string
        timeframe:
          type: string
        lookback_days:
          type: integer
        initial_capital:
          type: number
        optimization_mode:
          type: string
        optimization_iterations:
          type: integer
        optimization_seed:
          type: integer
    ConfigGetResponse:
      type: object
      required: [ok, settings, schema]
      properties:
        ok:
          type: boolean
        settings:
          type: object
          additionalProperties: true
        schema:
          type: object
          additionalProperties: true
        tokens:
          type: object
          additionalProperties:
            type: object
            properties:
              configured:
                type: boolean
              masked:
                type: string
                nullable: true
    TokenInfo:
      type: object
      properties:
        configured:
          type: boolean
        masked:
          type: string
          nullable: true
        valid:
          type: boolean
        message:
          type: string
    TokenStatusResponse:
      type: object
      properties:
        ok:
          type: boolean
        tokens:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/TokenInfo"
        message:
          type: string
    TokenSaveRequest:
      type: object
      properties:
        tinkoff_token:
          type: string
        twelvedata_token:
          type: string
        verify:
          type: boolean
          description: When true, validate tokens against broker APIs before saving
    PlannedBacktestRequest:
      type: object
      required: [action, strategy_id]
      properties:
        action:
          type: string
          enum: [start, stop]
        strategy_id:
          type: string
        params:
          type: object
          additionalProperties:
            type: number
    LiveRunResponse:
      type: object
      properties:
        ok:
          type: boolean
        active:
          type: boolean
        strategy_id:
          type: string
        strategy:
          type: object
          additionalProperties: true
        live:
          type: object
          additionalProperties: true
        stopped_reason:
          type: string
        message:
          type: string

openapi: 3.0.3
info:
  title: BackTestBench Dashboard API
  description: |
    Live Next.js route handlers used by the MVP2 dashboard (`http://localhost:3000`).

    Python subprocesses write JSON state under `data/`. This is not a durable run-history store.

    Planned FastAPI routes on port 8000 are listed under the **Planned** tag — they are not callable yet.

    Markdown reference: `docs/api_description.md`
  version: 1.0.0
  contact:
    name: BackTestBench
servers:
  - url: http://localhost:3000
    description: Local Next.js dev server
tags:
  - name: Dashboard
    description: Backtest run state and control
  - name: Config
    description: Runtime settings persisted in config/dashboard.json
  - name: Strategies
    description: Composable YAML strategy files
  - name: Tokens
    description: Broker API token status and persistence
  - name: Explore
    description: Custom date-range explore jobs
  - name: Bot
    description: Rolling out-of-sample trading bot jobs
  - name: Planned
    description: Target FastAPI contract — not implemented
paths:
  /api/dashboard:
    get:
      tags: [Dashboard]
      summary: Get dashboard state
      description: |
        Returns the latest multi-strategy dashboard payload from `data/runtime-dashboard.json`.
        If the file is missing or invalid, returns a valid idle state with HTTP 200.
      operationId: getDashboard
      responses:
        "200":
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardState"
  /api/bootstrap:
    post:
      tags: [Dashboard]
      summary: Start bootstrap backtest
      description: |
        Runs all composable strategies from `config/strategies/*.yaml` via `python main.py bootstrap`.
        Settings come from `config/dashboard.json`.
      operationId: postBootstrap
      responses:
        "202":
          description: Bootstrap subprocess started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResponse"
        "500":
          description: Token missing or launch failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/stop:
    post:
      tags: [Dashboard]
      summary: Stop running bootstrap
      description: Writes a stop request file and terminates the running bootstrap process when possible.
      operationId: postStop
      responses:
        "202":
          description: Stop request accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok, stopped]
                properties:
                  ok:
                    type: boolean
                  stopped:
                    type: boolean
                  killed:
                    type: boolean
                  dashboard_updated:
                    type: boolean
        "500":
          description: Stop request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/refresh-ranking:
    post:
      tags: [Dashboard]
      summary: Refresh strategy Top-N ranking
      description: Recomputes ranking from completed strategy metrics without rerunning backtests.
      operationId: postRefreshRanking
      responses:
        "202":
          description: Ranking refresh started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartResponse"
        "500":
          description: Launch failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/config:
    get:
      tags: [Config]
      summary: Load runtime settings schema
      description: Returns current settings, validation schema, and optional token status.
      operationId: getConfig
      responses:
        "200":
          description: Settings and schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigGetResponse"
        "500":
          description: Failed to load schema
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Config]
      summary: Save runtime settings
      operationId: postConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeSettings"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                type: object
                required: [ok, settings]
                properties:
                  ok:
                    type: boolean
                  settings:
                    type: object
                    additionalProperties: true
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Save failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/strategies:
    post:
      tags: [Strategies]
      summary: Add composable strategy YAML
      operationId: postStrategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [yaml]
              properties:
                yaml:
                  type: string
                  description: Full composable strategy YAML document
      responses:
        "200":
          description: Strategy added
          content:
            application/json:
              schema:
                type: object
                required: [ok, strategy]
                properties:
                  ok:
                    type: boolean
                  strategy:
                    $ref: "#/components/schemas/StrategySummary"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Save failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/strategies/{id}:
    delete:
      tags: [Strategies]
      summary: Delete composable strategy
      operationId: deleteStrategy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Strategy identifier (filename stem)
      responses:
        "200":
          description: Strategy deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok, deleted, file]
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: string
                  file:
                    type: string
        "400":
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/tokens:
    get:
      tags: [Tokens]
      summary: Get broker token status
      operationId: getTokens
      responses:
        "200":
          description: Token status per provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenStatusResponse"
        "500":
          description: Failed to load token status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Tokens]
      summary: Save and optionally verify tokens
      operationId: postTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenSaveRequest"
      responses:
        "200":
          description: Tokens saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenStatusResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenStatusResponse"
        "500":
          description: Save failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/explore:
    get:
      tags: [Explore]
      summary: Explore limits, job list, or job status
      operationId: getExplore
      parameters:
        - name: list
          in: query
          schema:
            type: string
            enum: ["1"]
          description: When set, list recent explore jobs
        - name: job_id
          in: query
          schema:
            type: string
          description: Poll a single explore job
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
          description: Max jobs when `list=1`
      responses:
        "200":
          description: Limits, job list, or job payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Explore]
      summary: Queue explore job
      description: Spawns `main.py explore-job {job_id}` in the background after queueing.
      operationId: postExplore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExploreStartRequest"
      responses:
        "202":
          description: Explore job queued
          content:
            application/json:
              schema:
                type: object
                required: [ok, job_id]
                properties:
                  ok:
                    type: boolean
                  job_id:
                    type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Start failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Explore]
      summary: Delete explore job file
      operationId: deleteExplore
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Missing job_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/bot:
    get:
      tags: [Bot]
      summary: Bot limits, job list, or job status
      operationId: getBot
      parameters:
        - name: list
          in: query
          schema:
            type: string
            enum: ["1"]
          description: When set, list recent bot jobs
        - name: job_id
          in: query
          schema:
            type: string
          description: Poll a single bot job
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
          description: Max jobs when `list=1`
      responses:
        "200":
          description: Limits, job list, or job payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags: [Bot]
      summary: Start, stop, or resume bot job
      operationId: postBot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/BotStartRequest"
                - $ref: "#/components/schemas/BotStopRequest"
                - $ref: "#/components/schemas/BotResumeRequest"
      responses:
        "202":
          description: Bot started or resumed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Request failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Bot]
      summary: Stop and delete bot job
      description: Calls `bot-stop` then deletes the job file.
      operationId: deleteBot
      parameters:
        - name: job_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job removed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Missing job_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /health:
    get:
      tags: [Planned]
      summary: "[Planned] API health check"
      description: Not implemented. Target FastAPI service on port 8000.
      operationId: plannedHealth
      servers:
        - url: http://localhost:8000
      responses:
        "501":
          description: Not implemented
  /strategies:
    get:
      tags: [Planned]
      summary: "[Planned] List registered strategies"
      description: Not implemented. Target FastAPI service on port 8000.
      operationId: plannedListStrategies
      servers:
        - url: http://localhost:8000
      responses:
        "501":
          description: Not implemented
  /backtest/run:
    post:
      tags: [Planned]
      summary: "[Planned] Start configurable backtest run"
      description: Not implemented. Target FastAPI service on port 8000.
      operationId: plannedBacktestRun
      servers:
        - url: http://localhost:8000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlannedBacktestRequest"
      responses:
        "501":
          description: Not implemented
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        message:
          type: string
    StartResponse:
      type: object
      required: [ok, started]
      properties:
        ok:
          type: boolean
          example: true
        started:
          type: boolean
          example: true
        message:
          type: string
    StrategySummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        file:
          type: string
    StrategyMetrics:
      type: object
      properties:
        total_pnl:
          type: number
        sharpe_ratio:
          type: number
        max_drawdown:
          type: number
        win_rate:
          type: number
        deposit_baseline_pnl:
          type: number
    StrategyEntry:
      type: object
      properties:
        strategy_id:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [idle, running, completed, error]
        params:
          type: object
          additionalProperties: true
        metrics:
          $ref: "#/components/schemas/StrategyMetrics"
        chart_points:
          type: array
          items:
            type: object
            additionalProperties: true
        trade_log:
          type: array
          items:
            type: object
            additionalProperties: true
    RankingEntry:
      type: object
      properties:
        rank:
          type: integer
        strategy_id:
          type: string
        instrument:
          type: string
        total_pnl:
          type: number
        sharpe_ratio:
          type: number
        max_drawdown:
          type: number
        win_rate:
          type: number
        previous_rank:
          type: integer
          nullable: true
        rank_delta:
          type: integer
          nullable: true
    DashboardState:
      type: object
      properties:
        instrument:
          type: string
          example: SBER
        timeframe:
          type: string
          example: 1h
        data_source:
          type: string
        initial_capital:
          type: number
        strategies:
          type: array
          items:
            $ref: "#/components/schemas/StrategyEntry"
        ranking:
          type: object
          properties:
            computed_at:
              type: string
              nullable: true
              format: date-time
            entries:
              type: array
              items:
                $ref: "#/components/schemas/RankingEntry"
        last_updated:
          type: string
          nullable: true
          format: date-time
    RuntimeSettings:
      type: object
      properties:
        data_source:
          type: string
        instrument:
          type: string
        timeframe:
          type: string
        lookback_days:
          type: integer
        initial_capital:
          type: number
        optimization_mode:
          type: string
        optimization_iterations:
          type: integer
        optimization_seed:
          type: integer
    ConfigGetResponse:
      type: object
      required: [ok, settings, schema]
      properties:
        ok:
          type: boolean
        settings:
          type: object
          additionalProperties: true
        schema:
          type: object
          additionalProperties: true
        tokens:
          type: object
          additionalProperties:
            type: object
            properties:
              configured:
                type: boolean
              masked:
                type: string
                nullable: true
    TokenInfo:
      type: object
      properties:
        configured:
          type: boolean
        masked:
          type: string
          nullable: true
        valid:
          type: boolean
        message:
          type: string
    TokenStatusResponse:
      type: object
      properties:
        ok:
          type: boolean
        tokens:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/TokenInfo"
        message:
          type: string
    TokenSaveRequest:
      type: object
      properties:
        tinkoff_token:
          type: string
        twelvedata_token:
          type: string
        verify:
          type: boolean
          description: When true, validate tokens against broker APIs before saving
    ExploreStartRequest:
      type: object
      required: [strategy_id]
      properties:
        strategy_id:
          type: string
          example: sma_cross_demo
        title:
          type: string
        params:
          type: object
          additionalProperties: true
          example:
            fast: 21
            slow: 50
        initial_capital:
          type: number
          example: 100000
        from_date:
          type: string
          format: date
          example: "2026-01-01"
        to_date:
          type: string
          format: date
          example: "2026-03-01"
        instrument:
          type: string
          example: SBER
        broker_source:
          type: string
          enum: [tbank, twelvedata, bybit, binance]
    BotStartRequest:
      type: object
      required: [strategy_id]
      properties:
        strategy_id:
          type: string
          example: ma_rsi_composable
        params:
          type: object
          additionalProperties: true
        instrument:
          type: string
          example: AAPL
        broker_source:
          type: string
          enum: [tbank, twelvedata, bybit, binance]
        timeframe:
          type: string
          example: 1h
        days_to_fetch:
          type: integer
          example: 7
        use_sandbox:
          type: boolean
        initial_capital:
          type: number
          example: 100000
    BotStopRequest:
      type: object
      required: [action, job_id]
      properties:
        action:
          type: string
          enum: [stop]
        job_id:
          type: string
    BotResumeRequest:
      type: object
      required: [action, job_id]
      properties:
        action:
          type: string
          enum: [resume]
        job_id:
          type: string
    PlannedBacktestRequest:
      type: object
      properties:
        strategy_id:
          type: string
          example: ma_crossover
        instrument:
          type: string
          example: SBER
        from_dt:
          type: string
          format: date-time
        to_dt:
          type: string
          format: date-time
        timeframe:
          type: string
          example: 1h
        initial_capital:
          type: number
          example: 100000
        params:
          type: object
          additionalProperties: true
